syntax = "proto2";

package cloudprober.rds.consul;

option go_package = "github.com/cloudprober/cloudprober/internal/rds/consul/proto";

message Instances {
  // How often resources should be refreshed.
  optional int32 re_eval_sec = 98 [default = 600];  // default 10 mins
}